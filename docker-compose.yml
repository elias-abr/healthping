services:
  healthping:
    build: ./backend
    image: healthping:dev
    container_name: healthping
    restart: unless-stopped
    volumes:
      - ./backend/config.example.yaml:/app/config.yaml:ro
    ports:
      - "8000:8000"
    command: ["serve", "--config", "/app/config.yaml", "--host", "0.0.0.0", "--port", "8000"]
